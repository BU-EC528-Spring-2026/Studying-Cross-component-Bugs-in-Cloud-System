version: '3.8'

# ZOOKEEPER-2184 Reproduction: BUGGY version (3.4.11)
# ZK client caches DNS at startup, never re-resolves.
# When ZK container restarts with a new IP, Kafka can never reconnect.

networks:
  zknet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

services:
  zookeeper:
    image: zookeeper:3.4.11
    container_name: zk-buggy
    hostname: zookeeper
    networks:
      zknet:
        # First run: ZK gets .10. After restart we force .20.
        ipv4_address: 172.30.0.10
    ports:
      - "2181:2181"
    environment:
      ZOO_TICK_TIME: 2000
      ZOO_MAX_CLIENT_CNXNS: 60

  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    container_name: kafka-client
    hostname: kafka
    depends_on:
      - zookeeper
    networks:
      zknet:
        ipv4_address: 172.30.0.30
    ports:
      - "9092:9092"
    environment:
      # Connects to ZK by HOSTNAME -- this is the key
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /kafka/logs
      # Short session timeout so we see the failure faster
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 15000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 10000
